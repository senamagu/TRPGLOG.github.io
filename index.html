<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ココフォリアログ置き場</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #DEF0ED;
      font-family: sans-serif;
      padding: 32px;
    }
    .header {
      max-width: 1400px;
      margin: 0 auto 48px;
      background: #4A72B7;
      color: #77C7CD;
      text-align: center;
      padding: 20px;
      border-radius: 22px;
      font-size: 32px;
      font-weight: bold;
    }
    .grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
    }
    .card {
      min-width: 0;
      align-self: start;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .image-box {
      aspect-ratio: 3 / 4;
      background: #989DA4;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #BCC4C3;
      font-size: 28px;
      font-weight: bold;
      overflow: hidden;
      transition: 0.25s;
      box-shadow: inset 0 0 0 rgba(255,255,255,0);
    }
    .card:hover .image-box {
      transform: scale(1.08) translateY(-4px);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.45);
    }
    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .info {
      height: 88px;
      margin: 20px auto 0;
      width: 100%;
      background: #6EB8DE;
      border-radius: 14px;
      padding: 12px 16px;
      transition: 0.25s;
    }
    .card:hover .info {
      background: #61D197;
      transform: translateY(6px);
    }
    .title {
      display: block;
      width: 100%;
      font-size: 18px;
      font-weight: bold;
      color: #4A72B7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card:hover .title,
    .card:hover .explorer-row {
      min-width: 0;
      color: #B2F5E1;
    }
    .line {
      height: 3px;
      background: #84C6E7;
      margin: 8px 0;
    }
    .card:hover .line,
    .card:hover .divider {
      background: #79DDA9;
    }
    .explorer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4A72B7;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
    }
    .divider {
      width: 2px;
      height: 16px;
      background: #84C6E7;
      flex-shrink: 0;
    }
    .name {
      display: block;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">ココフォリアログ置き場</div>
  <div class="grid" id="grid"></div>

<script>
  const grid = document.getElementById('grid');

  fetch('./logs.json')
    .then(res => res.json())
    .then(logs => {
      logs.forEach(log => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = log.link;
        card.target = '_blank';

        card.innerHTML = `
          <div class="image-box">
            ${log.image ? `<img src="${log.image}" alt="${log.title}">` : 'NoImage'}
          </div>
          <div class="info">
            <div class="title" title="${log.title}">${log.title}</div>
            <div class="line"></div>
            <div class="explorer-row">
              <span>探索者</span>
              <span class="divider"></span>
              <span class="name" title="${log.explorer}">${log.explorer}</span>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    });
</script>
</body>
</html>
